<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="title">freeCodeCamp Survey Form</h1>
            <p id="description" class="description">Thank you for taking the time to help us improve the platform</p>
        </header>
        <form action="#" id="survey-form">
            <div class="form-group">
                <label for="name" id="name-label">Name</label>
                <input type="text" placeholder="Enter your name" id="name" name="name" class="form-control" required >
            </div>
            <div class="form-group">
                <label for="email" id="email-label">Email</label>
                <input type="email" placeholder="Enter your email" id="email" name="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="number" id="number-label">Age (optional)</label>
                <input type="number" id="number" name="number" min="10" max="99" placeholder="Age" class="form-control">
            </div>
            <div class="form-group">
                <label for="dropdown">Which option best describes your current role?</label>
                <select name="dropdown" id="dropdown" class="form-control">
                    <option value="" selected disabled>Select current role</option>
                    <option value="student">Student</option>
                    <option value="full-time-job">Full Time Job</option>
                    <option value="full-time-learner">Full Time Learner</option>
                    <option value="prefer-not-to-say">Prefer not to say</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="recommend">Would you recommend freeCodeCamp to a friend?</label>
                <label>
                    <input type="radio" name="recommend" class="input-radio" value="definitely">
                    Definitely
                </label>
                <label>
                    <input type="radio" name="recommend" class="input-radio" value="maybe">
                    Maybe
                </label>
                <label>
                    <input type="radio" name="recommend" class="input-radio" value="notsure">
                    Not sure
                </label>
            </div>
            <div class="form-group">
                <label for="favorite">What is your favorite feature of freeCodeCamp?</label>
                <select name="favorite" id="favorite" class="form-control">
                    <option value="" selected disabled>Select an option</option>
                    <option value="challenges">Challenges</option>
                    <option value="projects">Projects</option>
                    <option value="community">Community</option>
                    <option value="opensource">Open Source</option>
                </select>
            </div>
            <div class="form-group">
                <label>
                    What would you like to see improved? (Check all that apply)</label>
                <label>
                    <input type="checkbox" class="input-checkbox" name="prefer" value="front-end-projects">
                    Front-end Projects</label>
                <label>
                    <input type="checkbox" class="input-checkbox" name="prefer" value="back-end-projects">
                    Back-end Projects</label>
                <label>
                    <input type="checkbox" class="input-checkbox" name="prefer" value="data-visualization">
                    Data Visualization</label>
                <label>
                    <input type="checkbox" class="input-checkbox" name="prefer" value="challenges">                    
                    Challenges</label>
                <label>
                    <input type="checkbox" class="input-checkbox" name="prefer" value="open-source-community">
                    Open Source Community</label>
                <label>
                    <input type="checkbox" class="input-checkbox" name="prefer" value="gitter-help-rooms">
                    Gitter help rooms</label>
                <label>
                    <input type="checkbox" class="input-checkbox" name="prefer" value="videos">
                    Videos</label>
                <label>
                    <input type="checkbox" class="input-checkbox" name="prefer" value="city-meetups">
                    City Meetups</label>
                <label>
                    <input type="checkbox" class="input-checkbox" name="prefer" value="wiki">
                    Wiki</label>
                <label>
                    <input type="checkbox" class="input-checkbox" name="prefer" value="forum">
                    Forum</label>
                <label>
                    <input type="checkbox" class="input-checkbox" name="prefer" value="additional-courses">
                    
                    Additional Courses</label>
            </div>
            <div class="form-group">
                <label for="comments">Any comments or suggestions?</label>
                <textarea name="comments" class="input-textarea" placeholder="Enter your comment here..."></textarea>
            </div>
            <div class="form-group">
                <input type="submit" id="submit" class="submit-btn">
            </div>
        </form>
    </div>
</body>
</html>
